<template>
    <!-- NON-COMPLIANT COMPONENT: Alert/Notification System -->
    <!-- This component intentionally violates SLDS best practices for workshop exercise -->

    <div class="alerts-container">
        <template for:each={alertsWithTypes} for:item="alert">
            <div key={alert.id} class={alert.alertClass}>
                <!-- Violation: Using div instead of semantic elements, missing ARIA attributes -->
                <div class="alert-icon-wrapper">
                    <!-- Violation: Using inline SVG instead of lightning-icon, hard-coded colors -->
                    <template lwc:if={alert.isError}>
                        <svg class="alert-icon" viewBox="0 0 24 24" style="fill: #c23934;">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                        </svg>
                    </template>
                    <template lwc:if={alert.isWarning}>
                        <svg class="alert-icon" viewBox="0 0 24 24" style="fill: #ff9a3c;">
                            <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-8h2v8z"/>
                        </svg>
                    </template>
                    <template lwc:if={alert.isSuccess}>
                        <svg class="alert-icon" viewBox="0 0 24 24" style="fill: #2e844a;">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                    </template>
                </div>

                <div class="alert-content">
                    <!-- Violation: No semantic heading level consideration -->
                    <div class="alert-title">{alert.title}</div>
                    <div class="alert-message">{alert.message}</div>
                </div>

                <!-- Violation: Custom close button without accessible label -->
                <button class="close-btn" data-id={alert.id} onclick={handleDismiss}>
                    <!-- Violation: Using HTML entity instead of proper icon, no aria-label -->
                    <span class="close-icon">X</span>
                </button>
            </div>
        </template>
    </div>

    <!-- Violation: Additional hard-coded inline form example -->
    <div class="inline-form">
        <div class="form-field">
            <label class="field-label">Email Notifications</label>
            <!-- Violation: Custom checkbox instead of lightning-input type="toggle" -->
            <div class="custom-toggle">
                <input type="checkbox" id="emailToggle" class="toggle-input">
                <label for="emailToggle" class="toggle-label"></label>
                <span class="toggle-text">Receive email alerts</span>
            </div>
        </div>
        <div class="form-field">
            <label class="field-label">Alert Frequency</label>
            <!-- Violation: Custom select instead of lightning-combobox -->
            <select class="custom-select">
                <option>Immediately</option>
                <option>Daily Digest</option>
                <option>Weekly Summary</option>
            </select>
        </div>
    </div>
</template>
